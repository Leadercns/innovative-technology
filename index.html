<!DOCTYPE html>
<html lang="zh">

<head>
    <meta charset="utf-8" />
    <meta name="renderer" content="webkit" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
    <meta name="force-rendering" content="webkit" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="description" content="全栈开发者Leader个人导航中心，开发的产品有LeadCore等等;感谢你来访问我！" />
    <meta name="keywords" content="个人中心,个人导航,Leader个人导航,开发者Leader" />
    <meta name="author" content="Leader" />
    <meta name="robots" content="index,follow" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Leader">
    <title>Leader - Web</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css">
    <link rel="apple-touch-icon" href="assets/gr.jpg" />
    <link rel="icon" href="assets/gr.jpg" />

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html {
            font-family: sans-serif;
            -ms-text-size-adjust: 100%;
            -webkit-text-size-adjust: 100%;
        }
        body {
            height: 100%;
            margin: 0;
            overflow: hidden;
            font-family: "ff-tisa-web-pro-1", "ff-tisa-web-pro-2", "Lucida Grande", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
            font-size: 1em;
            color: #666;
            -webkit-font-smoothing: antialiased;
            line-height: 1.6;
        }
        ::-webkit-scrollbar {
            width: 10px;
        }
        ::-webkit-scrollbar-track {
            background: rgba(200, 200, 200, 0.5);
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(100, 100, 100, 0.7);
            border-radius: 6px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.7);
        }
        .root::-webkit-scrollbar {
            display: none;
        }
        .root {
            -ms-overflow-style: none;
            overflow-x: hidden;
            overflow-y: auto;
            height: 100%;
        }
        a {
            text-decoration: none;
            color: inherit;
        }
        ul {
            list-style: none;
        }
        p {
            margin-bottom: 1.2em;
        }
        img {
            max-width: 100%;
            display: block;
        }

        .panel {
            display: table;
            width: 100%;
            height: 100%;
            background-color: white;
        }
        .panel-main__inner {
            display: table-cell;
            vertical-align: middle;
            padding: 15px 0;
        }
        .panel-main__content {
            max-width: 900px;
            margin: 0 auto;
            padding: 0 20px;
        }
        .panel-inverted {
            font-weight: 100;
            text-align: center;
            color: black;
        }
        .panel-cover {
            display: block;
            width: 100%;
            height: 100%;
            background: #fafafa;
        }

        .ih-item.circle {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            margin: 0 auto 8px;
        }
        .ih-item.circle .img {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            z-index: 11;
            transition: all 0.5s ease-in-out;
        }
        .ih-item.circle .img img {
            border-radius: 50%;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .ih-item.circle .info {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border-radius: 50%;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
        }
        .ih-item.circle .info .info-back {
            opacity: 1;
            border-radius: 50%;
            width: 100%;
            height: 100%;
            background: #333333;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }
        .ih-item.circle .info h2 {
            color: #fff;
            font-size: 18px;
            margin: 0;
        }
        .ih-item.circle .info p {
            color: #bbb;
            font-style: italic;
            font-size: 12px;
            margin: 0;
        }
        .ih-item.circle.effect.right_to_left .img {
            -webkit-transform-origin: 0% 50%;
            transform-origin: 0% 50%;
        }
        .ih-item.circle.effect.right_to_left a:hover .img {
            -webkit-transform: rotate3d(0, 1, 0, -180deg);
            transform: rotate3d(0, 1, 0, -180deg);
        }
        .profilepic {
            box-shadow: 0 0 0 2px rgba(255, 255, 255, 0.5), 0px 2px 20px 3px rgba(0, 0, 0, 0.25);
            border-radius: 50%;
            width: 128px;
            height: 128px;
            margin: 0 auto;
            overflow: hidden;
            background: #88acdb;
        }

        .thankyou {
            font-family: "Segoe UI Emoji", serif;
            font-size: 42px;
            color: black;
            margin: 0.2em 0 0.1em;
        }
        .panel-subtitle {
            font-size: 1.15em;
            font-weight: lighter;
            letter-spacing: 2px;
            color: #555;
        }
        .panel-cover__description {
            margin: 0 10px;
            font-size: 1em;
            color: #333;
        }
        .panel-cover__divider {
            width: 40%;
            margin: 12px auto;
            border-top: 1px solid rgba(0, 0, 0, 0.1);
        }

        .iUp {
            opacity: 0;
            -webkit-transform: translate3d(0, 60px, 0);
            transform: translate3d(0, 60px, 0);
            -webkit-transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1);
            transition: all 1.6s cubic-bezier(0.19, 1, 0.22, 1);
        }
        .iUp.up {
            opacity: 1;
            -webkit-transform: translate3d(0, 0, 0);
            transform: translate3d(0, 0, 0);
        }

        .navigation {
            display: block;
            width: 100%;
            margin-top: 8px;
        }
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
            margin-top: 15px;
        }
        .card {
            display: block;
            border: 1px solid #eaecef;
            padding: 20px 18px;
            text-decoration: none;
            color: #1a1a1a;
            background: #fff;
            border-radius: 4px;
            transition: background 0.15s, border-color 0.15s;
        }
        .card:hover {
            background: #fafbfc;
            border-color: #cbd5e0;
        }
        .card-title {
            font-size: 16px;
            font-weight: 500;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .card-arrow {
            color: #8a9bb0;
            font-size: 14px;
        }
        .card-desc {
            font-size: 13px;
            color: #5b6b82;
            line-height: 1.4;
        }
        .project-img {
            display: block;
            width: 100%;
            max-height: 120px;
            object-fit: cover;
            border-radius: 4px;
            margin-bottom: 14px;
            background: #f8f9fc;
            border: 1px solid #eef2f6;
        }
        .loading-placeholder,
        .error-placeholder,
        .empty-placeholder {
            grid-column: 1 / -1;
            text-align: center;
            padding: 40px 20px;
            color: #7e8c9e;
            font-size: 14px;
            background: #fafbfc;
            border-radius: 8px;
            border: 1px dashed #dce3ec;
        }
        .error-placeholder {
            color: #c97e5c;
            border-color: #f5d0c2;
            background: #fff8f5;
        }
        .empty-placeholder {
            color: #7e8c9e;
            border-color: #dce3ec;
            background: #fafbfc;
        }

        .navigation--social {
            margin-top: 28px;
        }
        .navigation--social .navigation__item {
            display: inline-block;
            border: none;
            background: none;
            padding: 0 10px;
            margin: 0 2px;
        }
        .navigation--social .navigation__item a {
            font-size: 1.9em;
            color: #333;
            transition: 0.3s;
        }
        .navigation--social .navigation__item a:hover {
            color: #4e97d8;
        }
        .navigation--social .navigation__item .label {
            display: none;
        }

        .remark {
            position: relative;
            text-align: center;
            padding: 6px 0 4px;
            background-color: #f6f6f7;
            border-top: 1px solid #dcdcdc;
            width: 100%;
        }
        .power {
            display: block;
            color: black;
            font-size: 15px;
            line-height: 1.6;
            letter-spacing: 0.3px;
        }
        .power-line {
            display: block;
            margin: 1px 0;
        }
        .power a {
            color: black;
            margin: 0 4px;
        }
        .power a:hover {
            text-decoration: underline;
        }
        .ga-badge {
            display: inline-flex;
            align-items: center;
            gap: 4px;
        }
        .ga-icon {
            height: 18px;
            width: auto;
            vertical-align: middle;
        }
        .ip-box {
            font-family: monospace;
            font-size: 13px;
            background: #f5f7fa;
            display: inline-block;
            padding: 2px 12px;
            border-radius: 3px;
            border: 1px solid #e2e8f0;
            color: #2c5a74;
        }
        .ip-box.error {
            color: #999;
            background: #f5f5f5;
        }
        .esa-provider {
            font-family: monospace;
            font-size: 13px;
            color: #6f7d95;
            letter-spacing: 0.3px;
        }

        @keyframes shake {
            0% { transform: rotate(0deg) scale(1) translateX(0); }
            25% { transform: rotate(-6deg) scale(1.04) translateX(-2px); }
            50% { transform: rotate(6deg) scale(1) translateX(2px); }
            75% { transform: rotate(-6deg) scale(0.96) translateX(-2px); }
            100% { transform: rotate(0deg) scale(1) translateX(0); }
        }
        .panel-cover__subtitle .shake {
            display: inline-block;
            animation: shake 0.8s ease-in-out 1 forwards;
        }

        @media (max-width: 780px) {
            .ih-item.circle, .ih-item.circle .img { width: 100px; height: 100px; }
            .profilepic { width: 100px; height: 100px; }
            .thankyou { font-size: 2em; }
            .panel-subtitle { font-size: 1em; }
            .card-grid { grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); }
            .power { font-size: 13px; }
        }
        @media (max-width: 480px) {
            .panel-main__content { padding: 0 12px; }
            .card-grid { grid-template-columns: 1fr; }
            .power { font-size: 12px; }
            .ga-icon { height: 16px; }
            .ip-box { font-size: 11px; padding: 1px 8px; }
            .esa-provider { font-size: 11px; }
        }
    </style>
</head>

<body class="root" id="b-1s" oncontextmenu="self.event.returnValue" onselectstart="return false">
    <header id="b-2s" class="panel-cover">
        <div class="panel-main panel">
            <div class="panel-main__inner panel-inverted">
                <div class="panel-main__content">
                    <div class="ih-item circle effect right_to_left" style="margin-top: 5%;">
                        <a class="blog-button">

    <script>
        (function() {
            "use strict";

            function loadProjects() {
                var gridContainer = document.getElementById('projectGrid');
                if (!gridContainer) return;
                gridContainer.innerHTML = '';
                var loadingEl = document.createElement('div');
                loadingEl.className = 'loading-placeholder';
                loadingEl.textContent = '加载项目中...';
                loadingEl.id = 'projectLoadingPlaceholder';
                gridContainer.appendChild(loadingEl);

                fetch('/project_list.json', { cache: 'no-cache', headers: { 'Accept': 'application/json' } })
                    .then(function(response) {
                        if (!response.ok) return null;
                        return response.json();
                    })
                    .then(function(data) {
                        var placeholder = document.getElementById('projectLoadingPlaceholder');
                        if (placeholder) placeholder.remove();

                        function hasValidProjects(projects) {
                            if (!Array.isArray(projects) || projects.length === 0) return false;
                            for (var i = 0; i < projects.length; i++) {
                                var p = projects[i];
                                if (p && (p.name || p.title)) return true;
                            }
                            return false;
                        }

                        if (data === null) {
                            var errorEl = document.createElement('div');
                            errorEl.className = 'error-placeholder';
                            errorEl.textContent = '项目列表不存在';
                            gridContainer.appendChild(errorEl);
                            return;
                        }
                        if (!hasValidProjects(data)) {
                            var emptyEl = document.createElement('div');
                            emptyEl.className = 'empty-placeholder';
                            emptyEl.textContent = '暂无项目';
                            gridContainer.appendChild(emptyEl);
                            return;
                        }

                        gridContainer.innerHTML = '';
                        for (var idx = 0; idx < data.length; idx++) {
                            var project = data[idx];
                            if (!project.name && !project.title) continue;
                            var projectName = project.name || project.title || '未命名项目';
                            var projectLink = project.link || project.url || '#';
                            var projectDesc = project.description || project.intro || '暂无简介';
                            var imageUrl = null;
                            if (project.hasOwnProperty('image') && typeof project.image === 'string' && project.image.trim()) {
                                imageUrl = project.image.trim();
                            }

                            var cardElement;
                            if (projectLink && projectLink !== '#') {
                                cardElement = document.createElement('a');
                                cardElement.href = projectLink;
                                cardElement.target = '_blank';
                                cardElement.rel = 'noopener noreferrer';
                            } else {
                                cardElement = document.createElement('div');
                                cardElement.style.cursor = 'default';
                            }
                            cardElement.className = 'card';

                            if (imageUrl) {
                                var img = document.createElement('img');
                                img.src = imageUrl;
                                img.alt = projectName;
                                img.className = 'project-img';
                                img.onerror = function() { this.style.display = 'none'; };
                                cardElement.appendChild(img);
                            }

                            var titleDiv = document.createElement('div');
                            titleDiv.className = 'card-title';
                            var nameSpan = document.createElement('span');
                            nameSpan.textContent = projectName;
                            var arrowSpan = document.createElement('span');
                            arrowSpan.className = 'card-arrow';
                            arrowSpan.textContent = '→';
                            titleDiv.appendChild(nameSpan);
                            titleDiv.appendChild(arrowSpan);

                            var descDiv = document.createElement('div');
                            descDiv.className = 'card-desc';
                            descDiv.textContent = projectDesc;

                            cardElement.appendChild(titleDiv);
                            cardElement.appendChild(descDiv);
                            gridContainer.appendChild(cardElement);
                        }
                    })
                    .catch(function(error) {
                        var placeholder = document.getElementById('projectLoadingPlaceholder');
                        if (placeholder) placeholder.remove();
                        var errorEl = document.createElement('div');
                        errorEl.className = 'error-placeholder';
                        errorEl.textContent = '项目列表不存在';
                        gridContainer.appendChild(errorEl);
                        console.warn('项目列表加载失败:', error);
                    });
            }

            function getUserIP() {
                var ipEl = document.getElementById('ipDisplay');
                if (!ipEl) return;
                var url = 'https://api64.ipify.org?format=json';
                var controller = new AbortController();
                var timeoutId = setTimeout(function() { controller.abort(); }, 4000);
                fetch(url, { signal: controller.signal })
                    .then(function(res) {
                        clearTimeout(timeoutId);
                        if (!res.ok) throw new Error('HTTP ' + res.status);
                        return res.json();
                    })
                    .then(function(data) {
                        var ip = data.ip || data.address || data.origin;
                        if (!ip) throw new Error('未获取到IP');
                        ipEl.textContent = 'IP: ' + ip;
                        ipEl.className = 'ip-box';
                    })
                    .catch(function(err) {
                        console.warn('IP获取失败:', err);
                        ipEl.textContent = 'IP: 获取失败';
                        ipEl.className = 'ip-box error';
                    });
            }

            function animateIup() {
                document.querySelectorAll('.iUp').forEach(function(el) {
                    el.classList.add('up');
                });
            }

            var shakeEl = document.querySelector('.panel-cover__subtitle .shake');
            if (shakeEl) {
                function triggerShake() {
                    shakeEl.classList.remove('shake');
                    void shakeEl.offsetWidth;
                    shakeEl.classList.add('shake');
                }
                triggerShake();
                shakeEl.addEventListener('animationend', function() {
                    setTimeout(triggerShake, 2200);
                });
            }

            function disableAllZooming() {
                document.addEventListener('gesturestart', function(e) { e.preventDefault(); });
                document.addEventListener('touchmove', function(e) {
                    if (e.touches.length >= 2) {
                        e.preventDefault();
                    }
                }, { passive: false });
                var lastTouchEnd = 0;
                document.addEventListener('touchend', function(e) {
                    var now = Date.now();
                    if (now - lastTouchEnd <= 300) {
                        e.preventDefault();
                    }
                    lastTouchEnd = now;
                }, false);
                window.addEventListener('wheel', function(e) {
                    if (e.ctrlKey || e.metaKey) {
                        e.preventDefault();
                        return false;
                    }
                }, { passive: false });
                window.addEventListener('keydown', function(e) {
                    if ((e.ctrlKey || e.metaKey) && (e.key === '+' || e.key === '-' || e.key === '0' || e.key === '=')) {
                        e.preventDefault();
                    }
                });
            }

            function init() {
                loadProjects();
                getUserIP();
                setTimeout(animateIup, 150);
                disableAllZooming();
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
